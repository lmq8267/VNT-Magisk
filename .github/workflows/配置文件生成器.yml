name: 配置文件生成器
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备 index.html
        run: |
          cd public
          cp 配置文件生成器.html index.html

      - name: 上传页面 Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

