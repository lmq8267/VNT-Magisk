    <title>配置文件生成器</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(to right, #f0f4ff, #ffffff);
            margin: 0;
            padding: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .form,
        .output {
            flex: 1 1 480px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            color: #2c3e50;
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin: 15px 0 6px;
            color: #34495e;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            background-color: #f9f9f9;
        }

        .server-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .server-group select {
            width: 100px;
        }

        .server-group input {
            flex: 1;
        }

        .list-group {
            margin-top: 5px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .list-item input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
        }

        .list-item .btn-group {
            display: flex;
            gap: 6px;
        }

        .list-item button {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-group-inline {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .add-btn {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            background-color: #2ecc71;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            min-width: 120px;
        }

        button:hover {
            opacity: 0.95;
            transform: scale(1.03);
        }

        .output pre {
            white-space: pre-wrap;
            background-color: #f8f8f8;
            border-radius: 12px;
            padding: 20px;
            height: 65vh;
            overflow-y: auto;
            font-size: 15px;
            color: #2c3e50;
            border: 1px solid #dcdcdc;
        }

        @media (max-width: 768px) {

            .form,
            .output {
                flex: 1 1 100%;
            }
        }

        /* 红色边框和闪烁动画 */
        .input-error {
            border-color: red !important;
            outline: none;
        }

        @keyframes blink-red {

            0%,
            100% {
                box-shadow: 0 0 5px 2px rgba(255, 0, 0, 0.7);
            }

            50% {
                box-shadow: none;
            }
        }

        .blink {
            animation: blink-red 1s infinite;
        }

        .divider-toggle {
            margin: 30px 0 10px;
            text-align: center;
            position: relative;
            cursor: pointer;
            font-weight: bold;
            color: #3498db;
            user-select: none;
        }

        .divider-toggle::before,
        .divider-toggle::after {
            content: "";
            height: 2px;
            background: #ccc;
            position: absolute;
            top: 50%;
            width: 40%;
        }

        .divider-toggle::before {
            left: 0;
        }

        .divider-toggle::after {
            right: 0;
        }

        .section-subtitle {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0 10px;
            color: #056578;
            font-weight: bold;
            user-select: none;
            gap: 10px;
        }

        .section-subtitle::before,
        .section-subtitle::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ccc;
        }

        .section-subtitle::before {
            left: 0;
        }

        .section-subtitle::after {
            right: 0;
        }

        .form-line {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 12px 0;
        }

        .form-line>label {
            width: 180px;
            /* 和其它 label 左对齐一致 */
            font-weight: bold;
            color: #34495e;
        }

        .wg-toggle {
            display: flex;
            gap: 20px;
        }

        .custom-radio {
            position: relative;
            padding-left: 24px;
            cursor: pointer;
            font-size: 15px;
            user-select: none;
        }

        .custom-radio input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .box-check {
            position: absolute;
            left: 0;
            top: 2px;
            width: 16px;
            height: 16px;
            border: 1px solid #999;
            border-radius: 2px;
            background: #fff;
        }

        .custom-radio input:checked+.box-check::after {
            content: "✓";
            position: absolute;
            left: 2px;
            top: -2px;
            font-size: 14px;
            color: #000;
        }

        .inline-hint {
            font-size: 12px;
            color: #f1c40f;
            /* 黄色 */
            margin-left: 8px;
            display: none;
        }

        button:disabled {
            background-color: #ccc;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
            transform: none !important;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 左侧输入区域 -->
        <div class="form">
            <h2>VNT启动参数</h2>

            <div class="section-subtitle">
                <span>基本参数</span>
            </div>
            <label title="-k  使用相同的token和服务器,就能组建一个虚拟局域网络">组网Token:</label><input id="token" placeholder="xxx" />
            <label title="--ip  指定虚拟ip,指定的ip不能和其他设备重复,必须有效并且在服务端所属网段下,留空则由服务端分配">虚拟IPv4:</label><input id="ip"
                placeholder="10.26.0.2" />
            <label title="-d  设备唯一标识符,不使用--ip参数时,服务端凭此参数分配虚拟ip,注意不能和其他客户端重复">设备ID:</label><input id="device_id"
                placeholder="10.26.0.2" />
            <label title="-n  给设备一个名字,便于区分不同设备">设备名称:</label><input id="name" placeholder="windows 11" />

            <label title="-s  注册和中继服务器地址,协议支持使用 udp tcp 和 ws 和 wss ">服务器地址:</label>
            <div class="server-group">
                <select id="protocol">
                    <option value="udp">UDP</option>
                    <option value="tcp">TCP</option>
                    <option value="ws">WS</option>
                    <option value="wss">WSS</option>
                </select>
                <input id="server_address" placeholder="vnt.wherewego.top:29872" />
            </div>

            <label
                title="--compressor  启用数据流量压缩,默认仅支持lz4压缩，开启压缩后，如果数据包长度大于等于128，则会使用压缩，否则还是会按原数据发送，也支持开启zstd压缩，但是需要自行编译程序，编译时加入参数--features zstd">压缩方式:</label>
            <select id="compressor">
                <option value="">不压缩</option>
                <option value="lz4">lz4</option>
                <option value="zstd">zstd</option>
            </select>

            <div class="form-line">
                <label for="allow_wire_guard"
                    title="--allow-wg  允许接入WireGuard客户端，和wg混用时必须开启此参数，表示允许由服务器转发来的wg流量访问本机">允许WireGuard流量:</label>
                <div class="wg-toggle">
                    <label class="custom-radio">
                        <input type="radio" name="allow_wire_guard" value="true">
                        <span class="box-check"></span>开启
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="allow_wire_guard" value="false" checked>
                        <span class="box-check"></span>关闭
                    </label>
                </div>
            </div>


            <div class="section-subtitle">
                <span>子网代理&端口映射</span>
            </div>
            <label title="-o  配置点对网时使用,-o 192.168.0.0/24表示允许将数据转发到192.168.0.0/24,可指定多个网段">本地网段(out-ip):</label>
            <div id="out_ips" class="list-group"></div>
            <button class="add-btn" onclick="addListItem('out_ips')">+ 添加</button>

            <label
                title="-i  配置点对网(IP代理)时使用,-i 192.168.3.0/24,10.26.0.3表示允许接收网段192.168.3.0/24的数据并转发到10.26.0.3,可指定多个网段">对端网段(in-ip):</label>
            <div id="in_ips" class="list-group"></div>
            <button class="add-btn" onclick="addListItem('in_ips')">+ 添加</button>

            <label
                title="--mapping  端口映射,可以设置多个映射地址，例如 udp:0.0.0.0:80-10.26.0.10:80 和 tcp:0.0.0.0:80-10.26.0.11:81 表示将本地udp 80端口的数据转发到10.26.0.10:80，将本地tcp 80端口的数据转发到10.26.0.11:81，转发的目的地址可以使用域名+端口">端口映射:</label>
            <div id="mapping" class="list-group"></div>
            <button class="add-btn" onclick="addListItem('mapping')">+ 添加</button>

            <div class="section-subtitle">
                <span>传输安全</span>
            </div>
            <label
                title="--model  加密模式(默认aes_gcm), 特别说明：xor只是对数据进行简单异或，仅仅避免了明文传输，安全性很差，同时对性能影响也极小，低性能设备选择xor或aes_ecb速度最快">加密方式:</label>
            <select id="cipher_model">
                <option value="aes_gcm">aes_gcm</option>
                <option value="aes_cbc">aes_cbc</option>
                <option value="aes_ecb">aes_ecb</option>
                <option value="sm4_cbc">sm4_cbc</option>
                <option value="chacha20_poly1305">chacha20_poly1305</option>
                <option value="chacha20">chacha20</option>
                <option value="xor">xor</option>
            </select>
            <label
                title="-w  使用该密码生成的密钥对客户端数据进行加密,并且服务端无法解密,使用相同密码的客户端才能通信，是用于客户端-客户端之间的加密，密码不会传递到服务端，只添加这个参数不会加密客户端-服务端通信的数据（留空则不会使用加密）">组网密码:</label><input
                id="password" placeholder="xxx" />

            <div class="form-line">
                <label for="server_encrypt"
                    title="-W  加密当前客户端和服务端通信的数据,请留意服务端指纹是否正确，采用rsa+aes256gcm加密客户端和服务端之间通信的数据，可以避免token泄漏、中间人攻击">服务端加密:</label>
                <div class="wg-toggle">
                    <label class="custom-radio">
                        <input type="radio" name="server_encrypt" value="true">
                        <span class="box-check"></span>开启
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="server_encrypt" value="false" checked>
                        <span class="box-check"></span>关闭
                    </label>
                </div>
            </div>

            <div class="form-line">
                <label for="finger"
                    title="--finger  开启数据指纹校验，可增加安全性，如果服务端开启指纹校验，则客户端也必须开启，开启会损耗一部分性能，注意：默认情况下服务端不会对中转的数据做校验，如果要对中转的数据做校验，则需要客户端、服务端都开启此参数">数据指纹校验:</label>
                <div class="wg-toggle">
                    <label class="custom-radio">
                        <input type="radio" name="finger" value="true">
                        <span class="box-check"></span>开启
                    </label>
                    <label class="custom-radio">
                        <input type="radio" name="finger" value="false" checked>
                        <span class="box-check"></span>关闭
                    </label>
                </div>
            </div>

            <!-- 高级设置开关按钮 -->

            <div class="divider-toggle" onclick="toggleAdvanced()">展开高级设置</div>

            <!-- 高级设置区域（默认隐藏） -->
            <div id="advanced-section" style="display: none; margin-top: 15px;">

                <label
                    title="--local-dev  当使用对端作为出口节点时需要指定本机的流量出口网卡名称，或本机是duoWAN接入时也需要指定准确的出口网卡名称">本地出口网卡的名称:</label><input
                    id="local_dev" placeholder="eth0" />
                <label title="--nic  指定虚拟网卡名称（默认为 vnt-tun）">虚拟网卡名称:</label><input id="device_name"
                    placeholder="vnt-tun" />
                <label title="-u  自定义虚拟网卡的mtu值(默认为1420)">虚拟网卡MTU:</label><input id="mtu" placeholder="1420" />
                <label title="--punch  选择只使用的打洞方式，默认都会使用">打洞模式:</label>
                <select id="punch_model">
                    <option value="">自动选择</option>
                    <option value="ipv4">ipv4</option>
                    <option value="ipv6">ipv6</option>
                    <option value="ipv4-tcp">ipv4-tcp</option>
                    <option value="ipv4-udp">ipv4-udp</option>
                    <option value="ipv6-tcp">ipv6-tcp</option>
                    <option value="ipv6-udp">ipv6-udp</option>
                </select>
                <label
                    title="--use-channel  ① relay:仅中继模式，会禁止打洞/p2p直连，只使用服务器转发。 ② p2p:仅直连模式，会禁止网络数据从服务器/客户端转发，只会使用服务器转发控制包。">传输模式:</label>
                <select id="use_channel">
                    <option value="">自动选择</option>
                    <option value="relay">relay（仅中继）</option>
                    <option value="p2p">p2p（仅直连）</option>
                </select>
                <label
                    title="--ports  指定本地监听的端口组，多个端口使用逗号分隔，多个端口可以分摊流量，增加并发、减缓流量限制，tcp会监听端口组的第一个端口，用于tcp直连。">监听端口:</label>
                <div id="ports" class="list-group"></div>
                <button class="add-btn" onclick="addListItem('ports')">+ 添加</button>

                <label title="--first-latency  默认情况下优先使用p2p通道，某些情况下可能p2p比客户端中继延迟更高，可使用低延迟优先来进行优化传输">路径模式:</label>
                <select id="first_latency">
                    <option value="false">P2P优先（表示客户端直连优先）</option>
                    <option value="true">低延迟优先（可能经过服务器转发）</option>
                </select>

                <div class="form-line">
                    <label for="no_proxy"
                        title="--no-proxy  内置的代理较为简单，而且一般来说直接使用网卡NAT转发性能会更高， 有需要可以自行配置NAT转发（关闭后需要自行配置防火墙规则转发）">内置IP代理:</label>
                    <div class="wg-toggle">
                        <label class="custom-radio">
                            <input type="radio" name="no_proxy" value="false" checked>
                            <span class="box-check"></span>开启
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="no_proxy" value="true">
                            <span class="box-check"></span>关闭
                        </label>
                    </div>
                </div>

                <label
                    title="--dns  设置域名解析服务器地址，可以设置多个。如果使用TXT记录的域名，则dns默认使用223.5.5.5和114.114.114.114，端口省略值为53 ，当地址解析失败时，会依次尝试后面的dns，直到有A记录、AAAA记录(或TXT记录)的解析结果。（安卓面具模块使用必须要指定）">DNS服务器:</label>
                <div id="dns" class="list-group"></div>
                <button class="add-btn" onclick="addListItem('dns', '', '8.8.8.8')">+ 添加</button>

                <label title="-e  stun服务器,用于探测NAT类型,可使用多个地址">STUN服务器:</label>
                <div id="stun" class="list-group"></div>
                <button class="add-btn" onclick="addListItem('stun')">+ 添加</button>

                <div class="form-line">
                    <label for="disable_stats" title="--disable-stats  关闭流量统计，减少性能占用（低性能设备建议关闭）">流量统计:</label>
                    <div class="wg-toggle">
                        <label class="custom-radio">
                            <input type="radio" name="disable_stats" value="false" checked>
                            <span class="box-check"></span>开启
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="disable_stats" value="true">
                            <span class="box-check"></span>关闭
                        </label>
                    </div>
                </div>

                <div class="form-line">
                    <label for="disable_cmd" title="--cmd  开启交互式命令,使用此参数开启控制台输入">控制台输入:</label>
                    <div class="wg-toggle">
                        <label class="custom-radio">
                            <input type="radio" name="disable_cmd" value="true">
                            <span class="box-check"></span>开启
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="disable_cmd" value="false" checked>
                            <span class="box-check"></span>关闭
                        </label>
                    </div>
                </div>

                <label title="--packet-loss  模拟丢包,取值0~1之间的小数,程序会按设定的概率主动丢包,可用于模拟弱网环境进行测试">
                    模拟丢包率:
                </label>
                <input id="packet_loss" type="number" min="0" max="1" step="0.01" placeholder="0" />

                <label title="--packet-delay 模拟延迟，正整数，单位毫秒，程序将根据设定值延迟发送数据包，可用于模拟弱网环境进行测试">
                    模拟延迟（ms）:
                </label>
                <input id="packet_delay" type="number" min="1" step="1" placeholder="0" />

            </div>

            <br><button class="button-group" onclick="generateConfig()">生成配置</button>
        </div>

        <!-- 右侧输出区域 -->
        <div class="output">
            <h2>配置文件生成区域</h2>
            <pre id="output">请先填写启动参数后再点击生成配置</pre>
            <div class="button-group">
                <button id="copyBtn" onclick="copyOutput()" disabled>复制</button>
                <button id="downloadBtn" onclick="downloadYaml()" disabled>下载</button>
            </div>
        </div>
    </div>

    <script>
        function toggleAdvanced() {
            const section = document.getElementById("advanced-section");
            const btn = event.target;

            if (section.style.display === "none") {
                section.style.display = "block";
                btn.textContent = "收起高级设置";
            } else {
                section.style.display = "none";
                btn.textContent = "展开高级设置";
            }
        }
        // 添加一行输入项
        function addListItem(id, value = "", placeholder = "") {
            const group = document.getElementById(id);
            const div = document.createElement("div");
            div.className = "list-item";
            const input = document.createElement("input");
            input.value = value;
            if (placeholder) input.placeholder = placeholder;
            const removeBtn = document.createElement("button");
            removeBtn.textContent = "- 移除";
            removeBtn.onclick = () => div.remove();
            div.appendChild(input);
            div.appendChild(removeBtn);
            group.appendChild(div);
        }

        // 获取所有输入值组成数组
        function getList(id) {
            const inputs = document.querySelectorAll(`#${id} input`);
            return Array.from(inputs).map(el => el.value.trim()).filter(v => v !== "");
        }

        // 获取单值
        const getVal = id => document.getElementById(id).value.trim();

        // 显示错误，支持消息内容传入
        function showTokenError(message) {
            const tokenInput = document.getElementById("token");
            tokenInput.classList.add("input-error");
            tokenInput.focus();

            // 移除旧提示，避免重复
            const oldError = document.getElementById("token-error");
            if (oldError) oldError.remove();

            // 新建提示
            const error = document.createElement("div");
            error.id = "token-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            tokenInput.insertAdjacentElement("afterend", error);

            // 添加闪烁动画
            tokenInput.classList.add("blink");
        }


        // 清除 token 错误提示和样式
        function clearTokenError() {
            const tokenInput = document.getElementById("token");
            tokenInput.classList.remove("input-error", "blink");
            const error = document.getElementById("token-error");
            if (error) error.remove();
        }
        // 显示 ip 错误提示
        function showIpError(message) {
            const ipInput = document.getElementById("ip");
            ipInput.classList.add("input-error");
            ipInput.focus();

            const oldError = document.getElementById("ip-error");
            if (oldError) oldError.remove();

            const error = document.createElement("div");
            error.id = "ip-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            ipInput.insertAdjacentElement("afterend", error);

            ipInput.classList.add("blink");
        }

        function clearIpError() {
            const ipInput = document.getElementById("ip");
            ipInput.classList.remove("input-error", "blink");
            const error = document.getElementById("ip-error");
            if (error) error.remove();
        }

        // 校验是否为合法IPv4地址
        function isValidIPv4(ip) {
            const parts = ip.split('.');
            if (parts.length !== 4) return false;
            for (let part of parts) {
                if (!/^\d+$/.test(part)) return false; // 不是纯数字
                const num = Number(part);
                if (num < 0 || num > 255) return false; // 数值范围非法
            }
            return true;
        }

        // 显示 mtu 错误提示
        function showMtuError(message) {
            const mtuInput = document.getElementById("mtu");
            mtuInput.classList.add("input-error");
            mtuInput.focus();

            const oldError = document.getElementById("mtu-error");
            if (oldError) oldError.remove();

            const error = document.createElement("div");
            error.id = "mtu-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            mtuInput.insertAdjacentElement("afterend", error);

            mtuInput.classList.add("blink");
        }

        function clearMtuError() {
            const mtuInput = document.getElementById("mtu");
            mtuInput.classList.remove("input-error", "blink");
            const error = document.getElementById("mtu-error");
            if (error) error.remove();
        }

        // 显示错误，支持消息内容传入
        function showdeviceidError(message) {
            const deviceidInput = document.getElementById("device_id");
            deviceidInput.classList.add("input-error");
            deviceidInput.focus();

            // 移除旧提示，避免重复
            const oldError = document.getElementById("deviceid-error");
            if (oldError) oldError.remove();

            // 新建提示
            const error = document.createElement("div");
            error.id = "deviceid-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            deviceidInput.insertAdjacentElement("afterend", error);

            // 添加闪烁动画
            deviceidInput.classList.add("blink");
        }


        // 清除 deviceid 错误提示和样式
        function cleardeviceidError() {
            const deviceidInput = document.getElementById("device_id");
            deviceidInput.classList.remove("input-error", "blink");
            const error = document.getElementById("deviceid-error");
            if (error) error.remove();
        }

        // 显示 packet_loss 错误提示
        function showPacketLossError(message) {
            const input = document.getElementById("packet_loss");
            input.classList.add("input-error");
            input.focus();

            const oldError = document.getElementById("packet_loss-error");
            if (oldError) oldError.remove();

            const error = document.createElement("div");
            error.id = "packet_loss-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            input.insertAdjacentElement("afterend", error);

            input.classList.add("blink");
        }

        function clearPacketLossError() {
            const input = document.getElementById("packet_loss");
            input.classList.remove("input-error", "blink");
            const error = document.getElementById("packet_loss-error");
            if (error) error.remove();
        }

        // 显示 packet_delay 错误提示
        function showPacketDelayError(message) {
            const input = document.getElementById("packet_delay");
            input.classList.add("input-error");
            input.focus();

            const oldError = document.getElementById("packet_delay-error");
            if (oldError) oldError.remove();

            const error = document.createElement("div");
            error.id = "packet_delay-error";
            error.style.color = "red";
            error.style.fontSize = "13px";
            error.style.marginTop = "4px";
            error.textContent = message;
            input.insertAdjacentElement("afterend", error);

            input.classList.add("blink");
        }

        function clearPacketDelayError() {
            const input = document.getElementById("packet_delay");
            input.classList.remove("input-error", "blink");
            const error = document.getElementById("packet_delay-error");
            if (error) error.remove();
        }

        // 生成配置
        function generateConfig() {
            clearTokenError();
            clearIpError();
            clearMtuError();
            cleardeviceidError();
            clearPacketLossError();
            clearPacketDelayError();

            const tokenVal = getVal("token");
            const ipVal = getVal("ip");
            const mtuVal = getVal("mtu");
            const deviceidVal = getVal("device_id");
            const packetLossVal = getVal("packet_loss");
            const packetDelayVal = getVal("packet_delay");

            // 1. 必填校验
            if (!tokenVal) {
                showTokenError("这是必填项哦，可别漏了哦~");
                return; // 阻止生成
            }
            // 2. 长度校验
            if (tokenVal.length > 63) {
                showTokenError("太长了吧，不能超过63个字符哦~");
                return; // 阻止生成
            }
            // 3. ID校验
            if (!deviceidVal) {
                showdeviceidError("建议填写一个设备ID哦，防止重启设备后客户端虚拟ip被占用~");
                return; // 阻止生成
            }
            // 4. ip 校验（非空时校验）
            if (ipVal && !isValidIPv4(ipVal)) {
                showIpError("请输入有效的IPv4地址!");
                return;
            }

            // 5.mtu 校验（非空时校验）
            if (mtuVal) {
                const mtuNum = Number(mtuVal);
                if (!Number.isInteger(mtuNum) || mtuNum < 68 || mtuNum > 9000) {
                    showMtuError("请输入68到9000之间的整数!");
                    return;
                }
            }

            // 6.校验 packet_loss
            if (packetLossVal) {
                const lossNum = Number(packetLossVal);
                if (isNaN(lossNum) || lossNum < 0 || lossNum > 1) {
                    showPacketLossError("丢包率必须是0到1之间的小数");
                    return;
                }
            }

            // 7.校验 packet_delay
            if (packetDelayVal) {
                const delayNum = Number(packetDelayVal);
                if (!Number.isInteger(delayNum) || delayNum < 0 || delayNum > 10000) {
                    showPacketDelayError("延迟必须是0到10000之间的整数（单位毫秒）");
                    return;
                }
                if (/^0\d+/.test(packetDelayVal)) {
                    showPacketDelayError("延迟值不能以0开头");
                    return;
                }
            }

            let config = [];

            const push = (key, value, comment = "") => {
                config.push(`${key}: ${value}${comment ? `   # ${comment}` : ""}`);
            };

            const pushList = (key, list, comment = "") => {
                if (list.length > 0) {
                    config.push(`${key}:${comment ? `   # ${comment}` : ""}`);
                    list.forEach(item => config.push(`  - ${item}`));
                }
            };

            if (getVal("token")) push("token", getVal("token"), "组网token");
            if (getVal("ip")) push("ip", getVal("ip"), "本机虚拟ip");
            if (getVal("device_id")) push("device_id", getVal("device_id"), "当前设备id");
            if (getVal("name")) push("name", getVal("name"), "当前设备名称");

            const proto = getVal("protocol");
            const addr = getVal("server_address");
            if (proto && addr) {
                push("server_address", `${proto}://${addr}`, "注册和中继服务器");
            }

            if (getVal("compressor")) push("compressor", getVal("compressor"), "压缩方式");
            const wgRadio = document.querySelector('input[name="allow_wire_guard"]:checked');
            const wgAllowed = wgRadio ? wgRadio.value : "false";
            if (wgAllowed === "true") {
                push("allow_wire_guard", "true", "为true则表示允许接入wg");
            }
            pushList("in_ips", getList("in_ips"), "对端网段(代理ip入站)");
            pushList("out_ips", getList("out_ips"), "本地网段(代理ip出站)");
            pushList("mapping", getList("mapping"), "端口映射");
            const password = getVal("password");
            const cipherModel = getVal("cipher_model");
            if (password) {
                // 如果加密方式不为默认的 aes_gcm 才写入配置
                if (cipherModel && cipherModel !== "aes_gcm") {
                    push("cipher_model", cipherModel, "加密方式");
                }
                // 有密码时先 push password
                push("password", password, "组网密码");
            }
            const seRadio = document.querySelector('input[name="server_encrypt"]:checked');
            const serverencrypt = seRadio ? seRadio.value : "false";
            if (serverencrypt === "true") {
                push("server_encrypt", "true", "为true则表示启用服务端加密");
            }
            const fRadio = document.querySelector('input[name="finger"]:checked');
            const sfinger = fRadio ? fRadio.value : "false";
            if (sfinger === "true") {
                push("finger", "true", "为true则表示启用数据指纹校验");
            }
            if (getVal("local_dev")) push("local_dev", getVal("local_dev"), "本地出口网卡的名称");
            if (getVal("device_name")) push("device_name", getVal("device_name"), "虚拟网卡名称");
            if (getVal("mtu")) push("mtu", getVal("mtu"), "mtu");
            if (getVal("punch_model")) push("punch_model", getVal("punch_model"), "打洞模式");
            if (getVal("use_channel")) push("use_channel", getVal("use_channel"), "传输模式");
            pushList("ports", getList("ports"), "监听端口");
            if (getVal("first_latency") === "true") {
                push("first_latency", "true", "路径模式-为true表示延迟优先");
            }
            const npRadio = document.querySelector('input[name="no_proxy"]:checked');
            const noproxy = npRadio ? npRadio.value : "false";
            if (noproxy === "true") {
                push("no_proxy", "true", "为true则表示关闭内置IP代理(关闭后需要自行配置防火墙规则转发)");
            }
            pushList("dns", getList("dns"), "dns服务器");
            pushList("stun_server", getList("stun"), "stun服务器");
            const dsRadio = document.querySelector('input[name="disable_stats"]:checked');
            const disablestats = dsRadio ? dsRadio.value : "false";
            if (disablestats === "true") {
                push("disable_stats", "true", "为true则表示关闭流量统计(低性能设备不建议开启会占用部分性能)");
            }
            const cmdRadio = document.querySelector('input[name="disable_cmd"]:checked');
            const disablecmd = cmdRadio ? cmdRadio.value : "false";
            if (disablecmd === "true") {
                push("cmd", "true", "为true则表示开启控制台输入");
            }
            const loss = getVal("packet_loss");
            if (loss && loss !== "0") {
                push("packet_loss", loss, "指定丢包率 取值0~1之间的数 用于模拟弱网");
            }
            const delay = getVal("packet_delay");
            if (delay && delay !== "0") {
                push("packet_delay", delay, "指定延迟 单位毫秒 用于模拟弱网");
            }

            document.getElementById("output").textContent = config.join("\n");
            document.getElementById("copyBtn").disabled = false;
            document.getElementById("downloadBtn").disabled = false;
            // 🔽 自动滚动到输出区域
            document.getElementById("output").scrollIntoView({
                behavior: "smooth", // 平滑滚动
                block: "start"      // 滚动到顶部
            });
        }

        function copyOutput() {
            const output = document.getElementById("output");
            const range = document.createRange();
            range.selectNode(output);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            document.execCommand("copy");
            alert("配置已复制到剪贴板！");
        }

        function downloadYaml() {
            const content = document.getElementById("output").textContent;
            const blob = new Blob([content], { type: "text/yaml;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "vnt_config.yaml");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        ["stun", "in_ips", "out_ips", "mapping", "dns", "ports"].forEach(id => {
            if (id === "stun") {
                addListItem(id, "", "turn.cloudflare.com");
            } else if (id === "in_ips") {
                addListItem(id, "", "192.168.3.0/24,10.26.0.3");
            } else if (id === "out_ips") {
                addListItem(id, "", "192.168.0.0/24");
            } else if (id === "mapping") {
                addListItem(id, "", "udp:0.0.0.0:80-10.26.0.10:80");
            } else if (id === "dns") {
                addListItem(id, "", "223.5.5.5");
            } else if (id === "ports") {
                addListItem(id, "", "0");
            }

        });
        // 监听输入，实时清除错误
        document.getElementById("token").addEventListener("input", () => {
            clearTokenError();
        });
        document.getElementById("ip").addEventListener("input", () => {
            clearIpError();
        });
        document.getElementById("mtu").addEventListener("input", () => {
            clearMtuError();
        });
        document.getElementById("device_id").addEventListener("input", () => {
            cleardeviceidError();
        });
        document.querySelectorAll("label[title]").forEach(label => {
            const hintSpan = document.createElement("span");
            hintSpan.className = "inline-hint";
            label.appendChild(hintSpan);

            // 尝试找到 input、select 或其父容器中的元素
            let input = label.nextElementSibling;

            // 如果下一个不是 input/select，继续找内部的 input 或 select
            if (input && !(input.tagName === "INPUT" || input.tagName === "SELECT")) {
                input = input.querySelector("input, select");
            }

            // 找到了就绑定 focus 和 blur
            if (input) {
                input.addEventListener("focus", () => {
                    hintSpan.textContent = label.getAttribute("title");
                    hintSpan.style.display = "inline";
                });
                input.addEventListener("blur", () => {
                    hintSpan.style.display = "none";
                });
            }

            // 特殊处理 radio 按钮组：监听同一组的所有 radio
            const name = input?.name;
            if (input?.type === "radio" && name) {
                const radios = document.querySelectorAll(`input[type="radio"][name="${name}"]`);
                radios.forEach(radio => {
                    radio.addEventListener("focus", () => {
                        hintSpan.textContent = label.getAttribute("title");
                        hintSpan.style.display = "inline";
                    });
                    radio.addEventListener("blur", () => {
                        hintSpan.style.display = "none";
                    });
                });
            }
        });

    </script>
